name: PR Validate and Release

on:
  pull_request:
    branches: ['main', 'master', 'develop']
  push:
    branches: ['main', 'master']

env:
  PACT_BROKER_URL: ${{ vars.PACT_BROKER_URL }}
  PACT_BROKER_USERNAME: ${{ vars.PACT_BROKER_USERNAME }}
  DOCKER_IMAGE: gouravmuleva/frontend

jobs:
  validate:
    name: Build and Test
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint code (if configured)
        run: npm run lint || echo "No lint script configured"
        continue-on-error: true

      - name: Run Unit Tests
        run: npm run test:unit

      - name: Run Consumer Pact Tests
        run: npm run test:pact

      - name: Publish Pacts to Broker
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        env:
          PACT_BROKER_PASSWORD: ${{ secrets.PACT_BROKER_PASSWORD }}
          CONSUMER_VERSION: ${{ github.sha }}
        run: npm run pact:publish

      - name: Build React App
        run: npm run build

  check:
    name: Validation Check
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: All checks passed
        run: echo "✅ All validation checks passed"

  build-image:
    name: Build Docker Image
    needs: check
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.semver.outputs.version }}
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Generate Semantic Version
        id: semver
        run: |
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "Latest tag: $LATEST_TAG"
          
          VERSION=${LATEST_TAG#v}
          MAJOR=$(echo $VERSION | cut -d. -f1)
          MINOR=$(echo $VERSION | cut -d. -f2)
          PATCH=$(echo $VERSION | cut -d. -f3)
          
          NEW_PATCH=$((PATCH + 1))
          NEW_VERSION="${MAJOR}.${MINOR}.${NEW_PATCH}"
          
          echo "New version: $NEW_VERSION"
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE }}:${{ steps.semver.outputs.version }}
            ${{ env.DOCKER_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create Git Tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag ${{ steps.semver.outputs.tag }}
          git push origin ${{ steps.semver.outputs.tag }}

  trigger-deployment:
    name: Trigger Deployment Update
    needs: build-image
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest
    
    steps:
      - name: Trigger deployment repository via API
        run: |
          curl -X POST \
            -H "Accept: application/vnd.github.v3+json" \
            -H "Authorization: token ${{ secrets.PAT_TOKEN }}" \
            https://api.github.com/repos/eypoc/deployment/dispatches \
            -d '{
              "event_type": "update-frontend",
              "client_payload": {
                "image": "${{ env.DOCKER_IMAGE }}",
                "version": "${{ needs.build-image.outputs.version }}",
                "repository": "${{ github.repository }}",
                "commit": "${{ github.sha }}"
              }
            }'
